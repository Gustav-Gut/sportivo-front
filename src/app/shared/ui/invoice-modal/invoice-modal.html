<app-drawer
  [isOpen]="isOpen()"
  title="Create Invoice"
  subtitle="Generate a new payment request"
  icon="receipt_long"
  width="450px"
  (closed)="closeModal()">

  <form id="invoiceForm" [formGroup]="invoiceForm" (ngSubmit)="onSubmit()" class="px-4 py-4 flex flex-col gap-5">
    
    <app-drawer-section
      [number]="1"
      title="Invoice Details"
      [isOpen]="true"
      [isDone]="invoiceForm.valid"
      (toggle)="null">

      <!-- Select Student -->
      <div class="space-y-4">
        <div>
          <label class="text-sm font-medium text-slate-300 block mb-2" for="studentId">Select Student <span class="text-red-400">*</span></label>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">search</span>
            <select
              formControlName="studentId"
              class="w-full bg-slate-800/50 border border-slate-700/50 text-slate-100 rounded-lg focus:ring-1 focus:ring-primary focus:border-primary h-12 pl-12 pr-10 appearance-none transition-colors cursor-pointer"
              id="studentId">
              <option value="" disabled selected>Search student...</option>
              <option value="1">Alex Johnson</option>
              <option value="2">Maria Garcia</option>
              <option value="3">David Smith</option>
            </select>
            <span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">expand_more</span>
          </div>
        </div>

        <!-- Concept -->
        <div>
          <label class="text-sm font-medium text-slate-300 block mb-2" for="concept">Billing Concept <span class="text-red-400">*</span></label>
          <input
            formControlName="concept"
            class="w-full bg-slate-800/50 border border-slate-700/50 text-slate-100 rounded-lg focus:ring-1 focus:ring-primary h-12 px-4 placeholder:text-slate-500 transition-colors"
            id="concept" placeholder="e.g., July Tuition" type="text" />
        </div>

        <div class="grid grid-cols-2 gap-4">
          <!-- Amount -->
          <div>
            <label class="text-sm font-medium text-slate-300 block mb-2" for="amount">Amount <span class="text-red-400">*</span></label>
            <div class="relative">
              <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 font-medium">$</span>
              <input
                formControlName="amount"
                class="w-full bg-slate-800/50 border border-slate-700/50 text-slate-100 rounded-lg focus:ring-1 focus:ring-primary h-12 pl-8 pr-4 placeholder:text-slate-500 transition-colors"
                id="amount" placeholder="0.00" type="number" />
            </div>
          </div>
          <!-- Due Date -->
          <div>
            <label class="text-sm font-medium text-slate-300 block mb-2" for="dueDate">Due Date <span class="text-red-400">*</span></label>
            <input
              formControlName="dueDate"
              class="w-full bg-slate-800/50 border border-slate-700/50 text-slate-100 rounded-lg focus:ring-1 focus:ring-primary h-12 px-4 transition-colors [color-scheme:dark] cursor-pointer"
              id="dueDate" type="date" />
          </div>
        </div>

        <!-- Payment Method -->
        <div>
          <label class="text-sm font-medium text-slate-300 block mb-2" for="paymentMethod">Default Payment Method</label>
          <div class="relative">
            <select
              formControlName="paymentMethod"
              class="w-full bg-slate-800/50 border border-slate-700/50 text-slate-100 rounded-lg focus:ring-1 focus:ring-primary focus:border-primary h-12 pl-4 pr-10 appearance-none transition-colors cursor-pointer"
              id="paymentMethod">
              <option value="cash">Cash Payment</option>
              <option value="card">Credit / Debit Card</option>
              <option value="transfer">Bank Transfer</option>
            </select>
            <span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">expand_more</span>
          </div>
        </div>
      </div>

    </app-drawer-section>

  </form>

  <!-- Sticky Footer -->
  <ng-container drawer-footer>
    <button (click)="closeModal()" type="button"
      class="px-6 py-2.5 rounded-lg text-sm font-medium text-slate-400 hover:text-white hover:bg-slate-800/50 transition-colors cursor-pointer">
      Cancel
    </button>
    <button type="submit" form="invoiceForm" [disabled]="invoiceForm.invalid || isSubmitting"
      class="px-6 py-2.5 rounded-lg text-sm font-medium text-white bg-primary hover:bg-primary/90 focus:ring-2 focus:ring-offset-2 focus:ring-offset-slate-900 focus:ring-primary transition-all cursor-pointer shadow-lg shadow-primary/20 flex items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed">
      
      @if (isSubmitting) {
        <svg class="animate-spin h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <span>Creating...</span>
      } @else {
        <span>Create Invoice</span>
        <span class="material-symbols-outlined text-sm">send</span>
      }
    </button>
  </ng-container>

</app-drawer>
