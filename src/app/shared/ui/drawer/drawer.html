@if (isOpen || isClosing()) {

  <!-- Backdrop: fades in on open, fades out on close -->
  <div class="fixed inset-0 bg-slate-950/70 backdrop-blur-sm z-40"
       [class.animate-fade-in]="!isClosing()"
       [class.animate-fade-out]="isClosing()"
       (click)="close()">
  </div>

  <!-- Panel: right on desktop, bottom sheet on mobile -->
  <div class="fixed z-50
              md:inset-y-0 md:right-0 md:left-auto md:h-full
              inset-x-0 bottom-0 md:bottom-auto
              bg-slate-900
              border-l border-slate-700/50 border-t border-slate-700/50
              md:rounded-none rounded-t-2xl
              flex flex-col
              md:max-h-full max-h-[92vh]"
       [class.drawer-panel-in]="!isClosing()"
       [class.drawer-panel-out]="isClosing()"
       [style]="'--drawer-width: ' + width">

    <!-- Mobile handle bar -->
    <div class="flex md:hidden justify-center pt-3 pb-1 shrink-0">
      <div class="w-10 h-1 rounded-full bg-slate-600"></div>
    </div>

    <!-- Header -->
    <div class="flex items-center justify-between px-6 py-4 border-b border-slate-700/50 shrink-0">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-lg bg-primary/10 border border-primary/20 flex items-center justify-center shrink-0">
          <span class="material-symbols-outlined text-primary text-[20px]">{{ icon }}</span>
        </div>
        <div>
          <h2 class="text-base font-bold text-slate-100 leading-tight">{{ title }}</h2>
          @if (subtitle) {
            <p class="text-xs text-slate-400 mt-0.5">{{ subtitle }}</p>
          }
        </div>
      </div>
      <button (click)="close()" type="button"
        class="w-8 h-8 rounded-lg flex items-center justify-center text-slate-400 hover:text-slate-100 hover:bg-slate-800 transition-colors cursor-pointer">
        <span class="material-symbols-outlined text-xl">close</span>
      </button>
    </div>

    <!-- Body (scrollable, projected content) -->
    <div class="flex-1 overflow-y-auto min-h-0">
      <ng-content></ng-content>
    </div>

    <!-- Footer slot (sticky at bottom) -->
    <div class="shrink-0 border-t border-slate-700/50 bg-slate-900/80 px-6 py-4 flex items-center justify-end gap-3">
      <ng-content select="[drawer-footer]"></ng-content>
    </div>

  </div>
}
