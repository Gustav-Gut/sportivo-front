<div class="flex-1 min-h-[250px] relative w-full pt-4 flex items-end justify-between px-2">
    @for(item of data; track item.label) {
    <div class="flex flex-col items-center gap-2 flex-1">
        <div class="flex items-end gap-1 w-full h-48 justify-center">
            @if(item.secondaryHeightClass) {
            <div
                class="flex-1 max-w-[32px] bg-blue-700 rounded-t-sm {{item.secondaryHeightClass}} hover:opacity-80 transition-opacity relative group cursor-pointer">
                <div
                    class="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 hidden group-hover:block bg-slate-800 text-xs text-white p-1 rounded whitespace-nowrap z-10">
                    {{item.secondaryValue}}
                </div>
            </div>
            }
            <div
                class="flex-1 max-w-[32px] bg-primary rounded-t-sm {{item.primaryHeightClass}} hover:opacity-80 transition-opacity relative group cursor-pointer">
                <div
                    class="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 hidden group-hover:block bg-slate-800 text-xs text-white p-1 rounded whitespace-nowrap z-10">
                    {{item.primaryValue}}
                </div>
            </div>
        </div>
        <span class="text-slate-400 text-xs font-semibold">{{item.label}}</span>
    </div>
    }
</div>
