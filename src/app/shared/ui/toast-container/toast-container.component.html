<div class="fixed bottom-4 right-4 z-50 flex flex-col gap-3 max-w-sm w-full pointer-events-none">
  @for (toast of toastService.toasts(); track toast.id) {
    <div 
      class="pointer-events-auto flex items-start gap-3 p-4 rounded-xl border shadow-xl backdrop-blur-md transition-all animate-toast-in"
      [ngClass]="{
        'bg-emerald-500/10 border-emerald-500/20 text-emerald-100': toast.type === 'success',
        'bg-red-500/10 border-red-500/20 text-red-100': toast.type === 'error',
        'bg-blue-500/10 border-blue-500/20 text-blue-100': toast.type === 'info',
        'bg-amber-500/10 border-amber-500/20 text-amber-100': toast.type === 'warning'
      }">
      
      <span class="material-symbols-outlined shrink-0 mt-0.5"
        [ngClass]="{
          'text-emerald-400': toast.type === 'success',
          'text-red-400': toast.type === 'error',
          'text-blue-400': toast.type === 'info',
          'text-amber-400': toast.type === 'warning'
        }">
        {{ getIcon(toast.type) }}
      </span>

      <p class="text-sm font-medium flex-1 pt-0.5">{{ toast.message }}</p>

      <button (click)="toastService.remove(toast.id)" class="shrink-0 p-1 opacity-50 hover:opacity-100 transition-opacity rounded-lg hover:bg-slate-800/50">
        <span class="material-symbols-outlined text-sm">close</span>
      </button>
    </div>
  }
</div>
