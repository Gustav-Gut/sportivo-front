<div class="flex min-h-full flex-col justify-center px-6 py-12 lg:px-8 relative overflow-hidden">
    <div class="hero-glow"></div>

    <div class="sm:mx-auto sm:w-full sm:max-w-sm relative z-10">
        <div class="flex justify-center items-center gap-2 mb-8">
            <div
                class="w-10 h-10 rounded-lg bg-gradient-to-br from-primary to-cyan flex items-center justify-center text-white font-bold text-2xl shadow-lg">
                S</div>
            <span class="font-bold text-3xl tracking-tight text-white">Sportivo</span>
        </div>

        <div class="glass-card px-8 py-10 sm:rounded-2xl sm:px-10">
            <h2 class="text-center text-2xl font-bold leading-9 tracking-tight text-white mb-2">Welcome back</h2>
            <p class="text-center text-sm text-bodyText mb-8">Please enter your details to sign in.</p>

            <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
                <div>
                    <label for="email" class="block text-sm font-medium leading-6 text-slate-300">Email address</label>
                    <div class="mt-2 relative">
                        <span
                            class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-[20px]">mail</span>
                        <input formControlName="email" id="email" type="email" autocomplete="email" required
                            class="block w-full rounded-lg border-0 bg-slate-900/50 py-2.5 pl-10 pr-3 text-white shadow-sm ring-1 ring-inset ring-slateBorder focus:ring-2 focus:ring-inset focus:ring-primary sm:text-sm sm:leading-6 placeholder:text-slate-500 transition-all">
                    </div>
                </div>

                <div>
                    <div class="flex items-center justify-between">
                        <label for="password"
                            class="block text-sm font-medium leading-6 text-slate-300">Password</label>
                        <div class="text-sm">
                            <a href="#" class="font-semibold text-primary hover:text-cyan transition-colors">Forgot
                                password?</a>
                        </div>
                    </div>
                    <div class="mt-2 relative">
                        <span
                            class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-[20px]">lock</span>
                        <input formControlName="password" id="password" type="password" autocomplete="current-password"
                            required
                            class="block w-full rounded-lg border-0 bg-slate-900/50 py-2.5 pl-10 pr-3 text-white shadow-sm ring-1 ring-inset ring-slateBorder focus:ring-2 focus:ring-inset focus:ring-primary sm:text-sm sm:leading-6 placeholder:text-slate-500 transition-all">
                    </div>
                </div>

                <div>
                    <button type="submit" [disabled]="loginForm.invalid"
                        class="flex w-full justify-center rounded-lg bg-primary px-3 py-2.5 text-sm font-semibold leading-6 text-white shadow-sm hover:bg-blue-600 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary transition-all disabled:opacity-50 disabled:cursor-not-allowed">Sign
                        in</button>
                </div>
            </form>
        </div>
    </div>
</div>
