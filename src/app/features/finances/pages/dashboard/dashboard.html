<div class="relative flex h-auto min-h-screen w-full flex-col group/design-root">
    <div class="layout-container flex h-full grow flex-col">
        <div class="px-4 md:px-8 lg:px-12 flex flex-1 justify-center py-5">
            <div class="layout-content-container flex flex-col w-full max-w-[1200px] flex-1">

                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
                    <app-stat-card title="Expected Revenue" value="$45,000" icon="account_balance_wallet"
                        trendText="+5% vs last month" glowColor="primary" trendColor="emerald">
                    </app-stat-card>

                    <app-stat-card title="Actual Collected" value="$32,500" icon="payments" [progressPercentage]="72"
                        glowColor="emerald">
                    </app-stat-card>

                    <app-stat-card title="Overdue / Mora" value="$12,500" icon="warning"
                        trendText="+15% needs attention" glowColor="red" trendColor="red">
                    </app-stat-card>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-6">
                    <div class="lg:col-span-2 glass-card rounded-2xl p-6 flex flex-col">
                        <div class="flex justify-between items-start mb-6">
                            <div>
                                <h3 class="text-lg font-bold text-white">6-Month Historical Revenue</h3>
                                <p class="text-slate-400 text-sm mt-1">Collected vs Expected per month</p>
                            </div>
                            <div class="flex items-center gap-4 text-sm">
                                <div class="flex items-center gap-2">
                                    <div class="w-3 h-3 rounded-full bg-blue-700"></div>
                                    <span class="text-slate-300">Expected</span>
                                </div>
                                <div class="flex items-center gap-2">
                                    <div class="w-3 h-3 rounded-full bg-primary"></div>
                                    <span class="text-slate-300">Collected</span>
                                </div>
                            </div>
                        </div>

                        <app-bar-chart [data]="revenueChartData"></app-bar-chart>
                    </div>

                    <div class="glass-card rounded-2xl p-6 flex flex-col gap-4">
                        <div>
                            <h3 class="text-lg font-bold text-white">Quick Actions</h3>
                            <p class="text-slate-400 text-sm mt-1">Manage collections</p>
                        </div>
                        <app-quick-action title="Send Reminders" subtitle="To 45 overdue accounts"
                            icon="mark_email_unread" theme="primary">
                        </app-quick-action>

                        <app-quick-action title="Generate Report" subtitle="Monthly financial summary"
                            icon="receipt_long" theme="emerald">
                        </app-quick-action>

                        <app-quick-action title="Apply Late Fees" subtitle="Process penalties" icon="gavel" theme="red">
                        </app-quick-action>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div class="lg:col-span-2 glass-card rounded-2xl p-6">
                        <div class="flex justify-between items-center mb-6">
                            <h3 class="text-lg font-bold text-white">Recent Payments</h3>
                            <button
                                class="text-primary text-sm font-medium hover:underline bg-transparent border-none">View
                                All</button>
                        </div>
                        <app-summary-table [columns]="paymentColumns" [data]="recentPayments"></app-summary-table>
                    </div>

                    <div class="glass-card rounded-2xl p-6">
                        <div class="flex justify-between items-center mb-6">
                            <h3 class="text-lg font-bold text-white">Top Overdue</h3>
                            <span
                                class="material-symbols-outlined text-red-500 text-sm bg-red-500/10 p-1 rounded">priority_high</span>
                        </div>
                        <div class="flex flex-col gap-4">
                            @for(account of overdueAccounts; track account.initials) {
                            <app-user-action-list [initials]="account.initials" [title]="account.name"
                                [subtitle]="account.daysOverdue + ' &middot; $' + account.amount">
                            </app-user-action-list>
                            }
                        </div>
                        <button
                            class="w-full mt-4 py-2 rounded-lg border border-slate-700 text-sm font-medium text-slate-300 hover:bg-slate-800 transition-colors bg-transparent">
                            View All Overdue Accounts
                        </button>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>
